[project]
site_name = "Rollup Pipeline"
site_description = "Documentation for the rollup pipeline — RiskLink + Verisk YLTs to Hisco parquets."
site_author = "Hiscox"
copyright = "Hiscox"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Quickstart" = "first-run.md" },
  { "Windows install" = "windows-install.md" },
  { "Loading your data" = "load-data.md" },
  { "EP Summaries" = "ep-summaries.md" },
  { "Troubleshooting" = "troubleshooting.md" },
  { "Reference" = [
    { "Calculation reference" = "calculation-reference.md" },
    { "Data requirements" = "data-requirements.md" },
    { "Adding LOBs & perils" = "adding-lobs-perils.md" },
    { "Utilities" = "utilities.md" },
    { "Architecture" = "architecture.md" },
    { "Developer guide" = "developer-guide.md" },
    { "Programmatic API" = "programmatic-api.md" },
    { "Operating modes" = "operating-modes.md" },
    { "Building packages" = "building.md" },
  ]},
]

[project.theme]
language = "en"
features = [
  "navigation.footer",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"
