[project]
site_name = "Polars Rollup Pipeline"
site_description = "Documentation for the polars rollup pipeline — RiskLink + Verisk YLTs to Hisco parquets."
site_author = "Hiscox"
copyright = "Hiscox"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Quickstart" = "first-run.md" },
  { "Loading your data" = "load-data.md" },
  { "Troubleshooting" = "troubleshooting.md" },
  { "Reference" = [
    { "File formats" = "file-formats.md" },
    { "Data requirements" = "data-requirements.md" },
    { "Architecture" = "architecture.md" },
    { "Factor chain" = "factor-chain.md" },
    { "Calculations" = "calculations.md" },
    { "Operating modes" = "operating-modes.md" },
  ]},
]

[project.theme]
language = "en"
features = [
  "navigation.footer",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"
