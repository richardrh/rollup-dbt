# DLT Configuration for Laiter Rollup
# This file defines destinations and pipeline settings

[runtime]
log_level = "INFO"
dlthub_telemetry = false

# DuckDB destination (for local testing/development)
[destination.duckdb]
dataset_name = "catmodel"

# SQL Server destination (for production)
[destination.mssql.credentials]
drivername = "mssql+pyodbc"
host = "prod-group-uw"
database = "CDS_Staging"
query = { driver = "ODBC Driver 18 for SQL Server",
    TrustServerCertificate = "yes",
    authentication = "ActiveDirectoryIntegrated" }

# Pipeline-specific settings
[pipeline.risklink_elt_import]
workers = 4
full_refresh = true

[pipeline.verisk_ylt_import]
workers = 4
full_refresh = true

[pipeline.risklink_simulation]
workers = 2
full_refresh = true
