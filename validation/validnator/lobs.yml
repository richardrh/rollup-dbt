name: Rollup LOB seed CSV validation
version: "1.0"

input:
  type: csv
  mode: raw_strings

rules:
  - code: LOBS_SCHEMA
    name: LOB seed required columns and types
    level: error
    message: "lobs.csv must contain the columns required by rollup"
    checks:
      - type: schema_matches
        mode: castable
        allow_extra_columns: true
        columns:
          modelled_lob: string
          rollup_lob: string
          class: string
          office: string
          currency: string

  - code: LOBS_REQUIRED_VALUES
    name: LOB seed required values
    level: error
    message: "LOB seed key fields must not be blank"
    checks:
      - type: not_null
        columns:
          - modelled_lob
          - rollup_lob
          - class
          - office
          - currency
