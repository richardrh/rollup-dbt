steps:
  - task: UsePythonVersion@0
    displayName: Select Python 3.13
    inputs:
      versionSpec: '3.13'
      addToPath: true

  - script: |
      curl -LsSf https://astral.sh/uv/0.11.31/install.sh | sh
      echo "##vso[task.prependpath]$HOME/.local/bin"
      "$HOME/.local/bin/uv" --version
    displayName: Install uv 0.11.31

  - script: mkdir -p "$UV_CACHE_DIR"
    displayName: Prepare uv cache directory

  - task: Cache@2
    displayName: Cache uv downloads
    inputs:
      key: 'uv | "$(Agent.OS)" | uv.lock'
      restoreKeys: |
        uv | "$(Agent.OS)"
        uv
      path: $(UV_CACHE_DIR)

  - script: uv sync --locked
    displayName: Sync project dependencies
