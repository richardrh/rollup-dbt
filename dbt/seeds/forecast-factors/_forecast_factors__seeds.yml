version: 2

seeds:
  - name: forecast_factors
    description: "Forecast factor registry by LOB and forecast date."
    config:
      column_types:
        lob_id: integer
        forecast_date: date
        factor: float
        office: varchar
        class: varchar
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [lob_id, forecast_date, office, class]
    columns:
      - name: lob_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hisco_org__lobs')
                field: lob_id
      - name: forecast_date
        tests:
          - not_null
      - name: factor
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.0
                max_value: 5.0
          - expression_is_true:
              arguments:
                expression: "factor > 0"
      - name: office
        tests:
          - dbt_utils.not_empty_string
      - name: class
        tests:
          - dbt_utils.not_empty_string
