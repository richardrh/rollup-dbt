version: 2

seeds:
  - name: forecast_factors
    description: "Forecast factor registry by LOB and forecast date."
    config:
      column_types:
        forecast_date: date
        entity: varchar
        office: varchar
        lob_type: varchar
        forecast_factor: float
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [forecast_date, entity, office, lob_type]
    columns:
      - name: forecast_date
        description: "Snapshot date for the forecast factor."
        tests:
          - not_null
      - name: entity
        description: "Business entity (e.g., HIG, 33)."
        tests:
          - not_null
      - name: office
        description: "Office code or geography (UK, EU, etc.)."
        tests:
          - not_null
          - dbt_utils.not_empty_string
      - name: lob_type
        description: "LOB type (FA, PROP, MGA, etc.)."
        tests:
          - not_null
      - name: forecast_factor
        description: "Applied factor multiplier."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.0
                max_value: 10.0
          - expression_is_true:
              arguments:
                expression: "forecast_factor > 0"
