version: 2
seeds:
  - name: hisco_org__lobs
    description: "Lookup table of HISCO Lines of Business."
    columns:
      - name: modelled_lob
        description: "Unique identifier for the LOB."
        tests:
          - not_null
          - unique
      - name: rollup_lob
        description: "Standardized LOB rollup grouping."
      - name: cds_cat_class_name
      - name: nds_class_name_gbp
      - name: nds_class_name_usd
  - name: hisco_org__forecast_factors
    description: "Forecast factors at office and class grain"
    config:
      column_types:
        class: varchar
        office: varchar
        office_iso2: varchar
        forecast_date: date
        forecast_factor: float
    columns:
      - name: class
      - name: office
      - name: office_iso2
      - name: forecast_date
      - name: forecast_factor
