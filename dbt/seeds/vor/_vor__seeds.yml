version: 2
seeds:
  - name: vor_blending_factors
    description: "VOR model blending factors per region-peril and vendor."
    config:
      column_types:
        id: integer
        BlendSetID: integer
        RegionPerilID: integer
        SubRegionPerilID: varchar
        SubRegionPeril: varchar
        AIRBlend: float
        RMSBlend: float
    columns:
      - name: id
        description: "Primary key for blending record."
        tests:
          - unique
          - not_null
      - name: BlendSetID
        description: "Blend set identifier."
      - name: RegionPerilID
        description: "Region-peril identifier."
      - name: SubRegionPerilID
      - name: SubRegionPeril
      - name: AIRBlend
      - name: RMSBlend
        description: "RMS model blend weight."
  - name: vor_euws_rate_factors
    description: "EUWS rate factors by ModelEventID and OccYear."
    config:
      column_types:
        ModelEventID: integer
        OccYear: integer
        Factor: float
    columns:
      - name: ModelEventID
        description: "Model event identifier."
        tests:
          - not_null
      - name: OccYear
        description: "Occurrence year."
      - name: Factor
        description: "Rate factor."
        tests:
          - not_null
  - name: vor_region_perils
    description: ""
    config:
      column_types:
        id: integer
        vendor: varchar
        modelled_region_peril: varchar
        cleaned_region_peril: varchar
        region: varchar
        peril: varchar
        adjustments: varchar
        applies_to_mga: boolean
        applies_to_prop: boolean
        applies_to_fa: boolean
    columns:
      - name: id
        description: "Primary key for blending record."
        tests:
          - unique
          - not_null
      - name: vendor
      - name: modelled_region_peril
      - name: cleaned_region_peril
      - name: rollup_region_peril
      - name: region
      - name: peril
      - name: adjustments
      - name: applies_to_mga
      - name: applies_to_prop
      - name: applies_to_fa
