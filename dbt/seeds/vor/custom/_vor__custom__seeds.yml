version: 2

seeds:
  - name: vor__custom__event
    description: "Event-level adjustments keyed by lob, region peril, vendor, metric, year, event, and model event."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: metric
        tests:
          - not_null
      - name: yearid
        tests:
          - not_null
      - name: eventid
        tests:
          - not_null
      - name: model_eventid
        tests:
          - not_null
      - name: adjustment_factor
        description: "Multiplicative adjustment applied to the base loss metrics."
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__lob_region_eventid
    description: "Metric-level adjustments by lob, region peril, and vendor."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: metric
        tests:
          - not_null
      - name: yearid
        tests:
          - not_null
      - name: eventid
        tests:
          - not_null
      - name: model_eventid
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__lob_region_vendor
    description: "Vendor-specific adjustments for a lob and region peril."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__lob_vendor
    description: "LOB-vendor level adjustments."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__lob
    description: "LOB-only fallbacks for when more granular overrides are absent."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__cds_cat_class_region
    description: "Fallback adjustments keyed by CDS catastrophe class and rollup region peril."
    columns:
      - name: cds_cat_class_name
        tests:
          - not_null
      - name: rollup_region_peril
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__cds_cat_class_region_rank
    description: "Adjustment factors ranked by CDS cap class and region peril."
    columns:
      - name: cds_cat_class_name
        tests:
          - not_null
      - name: rollup_region_peril
        tests:
          - not_null
      - name: rank
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"

  - name: vor__custom__lob_region_vendor_rank
    description: "Vendor+lob adjustments with metric-level overrides."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: metric
        tests:
          - not_null
      - name: rank
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "adjustment_factor > 0"
