- name: vor__blending_factors
  description: "VOR model blending factors per region-peril and vendor."
  config:
    column_types:
      id: integer
      BlendSetID: integer
      RegionPerilID: integer
      SubRegionPerilID: varchar
      SubRegionPeril: varchar
      AIRBlend: float
      RMSBlend: float
      KatRiskBlend: float
      created_at: date
  columns:
    - name: blending_factor_id
      description: "Primary key for blending record."
      tests:
        - unique
        - not_null
    - name: BlendSetID
      description: "Blend set identifier."
    - name: RegionPerilID
      description: "Region-peril identifier."
      tests:
        - relationships:
            to: ref('hisco__region_peril')
            field: region_peril_id
    - name: SubRegionPerilID
    - name: SubRegionPeril
    - name: AIRBlend
    - name: RMSBlend
    - name: KatRiskBlend
    - name: created_at
      description: "Creation timestamp."

- name: vor__euws_rate_factors
  description: "EUWS rate factors by ModelEventID and OccYear."
  config:
    column_types:
      ModelEventID: integer
      OccYear: integer
      Factor: float
  columns:
    - name: ModelEventID
      description: "Model event identifier."
      tests:
        - not_null
    - name: OccYear
      description: "Occurrence year."
    - name: Factor
      description: "Rate factor."
      tests:
        - not_null

- name: vor__custom__event
  description: "Event-level adjustments keyed by lob, region peril, vendor, metric, year, event, and model event."
  columns:
    - name: lob_id
      tests:
        - not_null
    - name: region_peril_id
      tests:
        - not_null
    - name: vendor
      tests:
        - not_null
    - name: metric
      tests:
        - not_null
    - name: yearid
      tests:
        - not_null
    - name: eventid
      tests:
        - not_null
    - name: model_eventid
      tests:
        - not_null
    - name: adjustment_factor
      description: "Multiplicative adjustment applied to the base loss metrics."
      tests:
        - not_null
        - expression_is_true:
            expression: "adjustment_factor > 0"
- name: vor__custom__lob_region_eventid
  description: "Metric-level adjustments by lob, region peril, and vendor."
  columns:
    - name: lob_id
      tests:
        - not_null
    - name: region_peril_id
      tests:
        - not_null
    - name: vendor
      tests:
        - not_null
    - name: metric
      tests:
        - not_null
    - name: adjustment_factor
      tests:
        - not_null
        - expression_is_true:
            expression: "adjustment_factor > 0"
- name: vor__custom__lob_region_vendor
  description: "Vendor-specific adjustments for a lob and region peril."
  columns:
    - name: lob_id
      tests:
        - not_null
    - name: region_peril_id
      tests:
        - not_null
    - name: vendor
      tests:
        - not_null
    - name: adjustment_factor
      tests:
        - not_null
        - expression_is_true:
            expression: "adjustment_factor > 0"
- name: vor__custom__lob_vendor
  description: "LOB-vendor level adjustments."
  columns:
    - name: lob_id
      tests:
        - not_null
    - name: vendor
      tests:
        - not_null
    - name: adjustment_factor
      tests:
        - not_null
        - expression_is_true:
            expression: "adjustment_factor > 0"
- name: vor__custom__lob
  description: "LOB-only fallbacks for when more granular overrides are absent."
  columns:
    - name: lob_id
      tests:
        - not_null
    - name: adjustment_factor
      tests:
        - not_null
        - expression_is_true:
            expression: "adjustment_factor > 0"
- name: vor__custom__cds_cat_class_region
  description: "Fallback adjustments keyed by CDS catastrophe class and rollup region peril."
  columns:
    - name: cds_cat_class_name
      tests:
        - not_null
    - name: rollup_region_peril
      tests:
        - not_null
    - name: adjustment_factor
      tests:
        - not_null
        - expression_is_true:
            expression: "adjustment_factor > 0"

- name: vor__custom__cds_cat_class_region_rank
  description: "Adjustment factors ranked by CDS cap class and region peril."
  columns:
    - name: cds_cat_class_name
      tests:
        - not_null
    - name: rollup_region_peril
      tests:
        - not_null
    - name: rank
      tests:
        - not_null
    - name: adjustment_factor
      tests:
        - not_null
        - expression_is_true:
