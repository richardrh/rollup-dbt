version: 2
models:
  - name: stg_cat_modelling_results__ylts
    description: "Staging view for YLT data from all vendors. Reads from hive-partitioned parquet store at cat_results/date=.../vendor=.../type=ylt/."
    columns:
      - name: pk
        description: "Surrogate primary key: hash of (vendor, year_id, event_id, analysis_id)"
        tests:
          - unique
          - not_null
      - name: source_file
        description: "Source parquet filename (e.g. fine-art-uuid-1234.parquet)."
      - name: analysis_id
        description: "Vendor-specific analysis identifier. Must be joined with source_vendor."
        tests:
          - not_null
      - name: model_code
        description: "Model code identifier."
      - name: year_id
        description: "Simulation year identifier."
        tests:
          - not_null
      - name: event_id
        description: "Catastrophe event identifier."
        tests:
          - not_null
      - name: loss
        description: "Simulated loss value."
        tests:
          - not_null
      - name: source_vendor
        description: "Vendor source extracted from hive partition (vendor=risklink|verisk)."
        tests:
          - not_null
      - name: run_date
        description: "Run date extracted from hive partition (date=YYYY-MM-DD)."
        tests:
          - not_null
  - name: stg_cat_modelling_results__analysis_lists
    description: "Staged analysis list metadata. One row per analysis per vendor. analysis_id is vendor-scoped — always join with source_vendor."
    columns:
      - name: pk
        description: "Surrogate key: hash of (vendor, analysis_id)"
        tests:
          - unique
          - not_null
      - name: source_file
        description: "Source parquet filename including path"
      - name: analysis_id
        description: "Vendor-assigned analysis identifier. NOT globally unique — vendor-scoped."
        tests:
          - not_null
      - name: modelled_lob
        description: "Modelled line of business"
        tests:
          - not_null
      - name: region_peril
        description: "Region and peril combination e.g. US_HURRICANE"
        tests:
          - not_null
      - name: analysis_modifications
        description: "Description of analysis modifications applied. Used to select the appropriate analysis for a given modelled_lob."
      - name: is_official
        description: "Flag indicating whether this analysis is official."
      - name: source_vendor
        description: "Vendor who produced this analysis (from hive partition key)"
        tests:
          - not_null
      - name: run_date
        description: "Run date from hive partition key"
        tests:
          - not_null
      - name: AAL
        description: "Average Annual Loss from vendor model."
      - name: OEP_200
        description: "Occurrence Exceedance Probability at 200-year return period."
      - name: OEP_1000
        description: "Occurrence Exceedance Probability at 1000-year return period."
      - name: AEP_200
        description: "Aggregate Exceedance Probability at 200-year return period."
      - name: AEP_1000
        description: "Aggregate Exceedance Probability at 1000-year return period."
