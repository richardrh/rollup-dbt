version: 2

models:
  - name: stg_risklink__ylts
    description: "Staging view for Risklink YLT data. Reads from hive-partitioned parquet store at cat_results/risklink/ylts/date=.../."
    columns:
      - name: pk
      - name: aggregation_key
      - name: run_date
        description: "Run date extracted from hive partition (date=YYYY-MM-DD)."
        tests:
          - not_null
      - name: source_file
        description: "Source parquet filename (e.g. fine-art-uuid-1234.parquet)."
      - name: analysis_id
        description: "Risklink analysis identifier."
      - name: year_id
        description: "Simulation year identifier."
        tests:
          - not_null
      - name: event_id
        description: "Catastrophe event identifier."
        tests:
          - not_null
      - name: loss
        description: "Simulated loss value."
        tests:
          - not_null
