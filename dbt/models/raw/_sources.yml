version: 2
# DuckDB parquet files cannot be declared as dbt sources (source() only works
# for database tables/views). Raw models in this folder ARE the source layer —
# they read directly from external parquet files using read_parquet() and the
# cat_results_path var defined in dbt_project.yml.
#
# Data ingestion structure (hive-partitioned):
#
#   ../rollup-data/cat_results/
#     date=YYYY-MM-DD/
#       vendor=risklink/
#         type=ylt/
#           <name>-<uuid>.parquet
#         type=analysis_list/
#           analysis_list.parquet
#       vendor=verisk/
#         type=ylt/
#           <name>-<uuid>.parquet
#         type=analysis_list/
#           analysis_list.parquet
#
# DuckDB hive_partitioning=true auto-extracts date, vendor, and type as columns.
# No regex extraction is needed for these partition keys.
#
# Raw models expose these files as views that downstream staging models ref() into.
models:
  - name: hive_storage__raw_ylts
    description: >
      Raw view over hive-partitioned YLT parquet files from all vendors. Reads all parquet files under cat_results_path/date=YYYY-MM-DD/vendor=*/type=ylt/. Each parquet file represents a single LOB or analysis set (e.g. fine-art-uuid.parquet).

    columns:
      - name: date
        description: "Run date extracted from hive partition folder (date=YYYY-MM-DD)."
        tests:
          - not_null
      - name: vendor
        description: "Vendor source extracted from hive partition folder (vendor=risklink|verisk)."
        tests:
          - not_null
      - name: filename
        description: "Full path to the source parquet file, including hive partition folders."
        tests:
          - not_null
      - name: analysis_id
        description: "Vendor-specific analysis identifier."
        tests:
          - not_null
      - name: year_id
        description: "Simulation year identifier."
        tests:
          - not_null
      - name: event_id
        description: "Catastrophe event identifier."
        tests:
          - not_null
      - name: loss
        description: "Simulated loss value."
        tests:
          - not_null
  - name: hive_storage__raw_analysis_lists
    description: >
      Raw view over hive-partitioned analysis list parquet files from all vendors. Reads all parquet files under cat_results_path/date=YYYY-MM-DD/vendor=*/type=analysis_list/. Contains metadata about what is included in each analysis.

    columns:
      - name: date
        description: "Run date extracted from hive partition folder (date=YYYY-MM-DD)."
        tests:
          - not_null
      - name: vendor
        description: "Vendor source extracted from hive partition folder (vendor=risklink|verisk)."
        data_tests:
          - accepted_values:
              arguements:
                values: ['verisk', 'risklink']
      - name: filename
        description: "Full path to the source parquet file, including hive partition folders."
        tests:
          - not_null
      - name: analysis_id
        description: "Vendor-specific analysis identifier."
        tests:
          - not_null
      - name: modelled_lob
        description: "Line of business being modelled."
        tests:
          - not_null
      - name: region_peril
        description: "Region and peril combination e.g. US_HURRICANE."
        tests:
          - not_null
      - name: analysis_modifications
        description: "Description of analysis modifications applied."
      - name: is_official
        description: "If this is an analysis that should be in the final rollup"
      - name: AAL
        data_tests:
          - not_null
      - name: OEP_200
        data_tests:
          - not_null
      - name: OEP_200
        data_tests:
          - not_null
      - name: OEP_1000
        data_tests:
          - not_null
      - name: OEP_200
        data_tests:
          - not_null
      - name: AEP_200
        data_tests:
          - not_null
      - name: AEP_1000
        data_tests:
          - not_null
