version: 1
description: Pipeline YLT dataset contracts colocated with YLT inputs.

datasets:
  raw_verisk_ylt:
    role: source
    glob: data/ylt/verisk/*.parquet
    format: parquet
    required: true
    description: Raw AIR/Verisk YLT parquet exports with vendor wire column names.
    columns:
      - {name: Analysis, dtype: string, required: true, description: Verisk analysis label/id.}
      - {name: ExposureAttribute, dtype: string, required: true, description: Verisk LOB label.}
      - {name: CatalogTypeCode, dtype: string, required: true, description: Verisk catalog type.}
      - {name: EventID, dtype: int64, required: true, description: Event identifier.}
      - {name: ModelCode, dtype: int64, required: true, description: Model code.}
      - {name: YearID, dtype: int64, required: true, description: Simulation year.}
      - {name: PerilSetCode, dtype: int64, required: true, description: Verisk peril set code.}
      - {name: GroundUpLoss, dtype: float64, required: true, description: Ground-up loss.}
      - {name: GrossLoss, dtype: float64, required: true, description: Gross loss.}
      - {name: NetOfPreCatLoss, dtype: float64, required: true, description: Net pre-cat loss.}
      - {name: filename, dtype: string, required: true, description: Source file name.}

  raw_risklink_ylt:
    role: source
    glob: data/ylt/risklink/*.parquet
    format: parquet
    required: true
    description: Raw RMS/RiskLink YLT parquet exports with vendor wire column names.
    columns:
      - {name: yearid, dtype: int64, required: true, description: Simulation year.}
      - {name: eventid, dtype: int64, required: true, description: Event identifier.}
      - {name: p_value, dtype: float64, required: true, description: Probability value.}
      - {name: anlsid, dtype: int64, required: true, description: RiskLink analysis identifier.}
      - {name: meanloss, dtype: float64, required: true, description: Mean loss.}
      - {name: stddev, dtype: float64, required: true, description: Standard deviation.}
      - {name: expvalue, dtype: float64, required: true, description: Expected value.}
      - {name: loss, dtype: float64, required: true, description: Loss.}

  stg_normalized_ylt:
    role: staging
    format: lazyframe
    required: true
    description: Minimal canonical YLT shape used by initial pipeline flow.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Ground-up or normalized loss.}

  int_selected_losses:
    role: intermediate
    format: lazyframe
    required: true
    description: Normalized YLT rows filtered to selected analyses.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Selected loss.}

  int_enriched_losses:
    role: intermediate
    format: lazyframe
    required: true
    description: Selected losses joined to analysis, peril, and LOB business dimensions.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Selected loss.}
      - {name: modelled_label, dtype: string, required: false, description: Vendor modelled label.}
      - {name: peril_id, dtype: int64, required: false, description: Canonical peril key.}
      - {name: lob_id, dtype: int64, required: false, description: Canonical LOB key.}
      - {name: peril_name, dtype: string, required: false, description: Peril display name.}
      - {name: region, dtype: string, required: false, description: Peril region.}
      - {name: peril_family, dtype: string, required: false, description: Peril family.}
      - {name: modelled_lob, dtype: string, required: false, description: Vendor modelled LOB.}
      - {name: rollup_lob, dtype: string, required: false, description: Rollup LOB.}
      - {name: lob_type, dtype: string, required: false, description: LOB type.}
      - {name: cds_cat_class_name, dtype: string, required: false, description: Hiscox class name.}
      - {name: office, dtype: string, required: false, description: Hiscox office.}
      - {name: class, dtype: string, required: false, description: Hiscox class code.}
      - {name: currency, dtype: string, required: false, description: Local currency.}

  int_adjusted_losses:
    role: intermediate
    format: lazyframe
    required: true
    description: Enriched losses with VOR forecast, FX, and EUWS factors applied.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Selected loss.}
      - {name: modelled_label, dtype: string, required: false, description: Vendor modelled label.}
      - {name: peril_id, dtype: int64, required: false, description: Canonical peril key.}
      - {name: lob_id, dtype: int64, required: false, description: Canonical LOB key.}
      - {name: peril_name, dtype: string, required: false, description: Peril display name.}
      - {name: region, dtype: string, required: false, description: Peril region.}
      - {name: peril_family, dtype: string, required: false, description: Peril family.}
      - {name: modelled_lob, dtype: string, required: false, description: Vendor modelled LOB.}
      - {name: rollup_lob, dtype: string, required: false, description: Rollup LOB.}
      - {name: lob_type, dtype: string, required: false, description: LOB type.}
      - {name: cds_cat_class_name, dtype: string, required: false, description: Hiscox class name.}
      - {name: office, dtype: string, required: false, description: Hiscox office.}
      - {name: class, dtype: string, required: false, description: Hiscox class code.}
      - {name: currency, dtype: string, required: false, description: Local currency.}
      - {name: forecast_factor, dtype: float64, required: true, description: Forecast scalar.}
      - {name: fx_rate, dtype: float64, required: true, description: FX scalar.}
      - {name: euws_rate_factor, dtype: float64, required: true, description: EUWS scalar.}
      - {name: adjusted_loss, dtype: float64, required: true, description: Adjusted GBP loss.}

  int_blended_losses:
    role: intermediate
    format: lazyframe
    required: true
    description: Adjusted losses with vendor blend weights applied.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Selected loss.}
      - {name: modelled_label, dtype: string, required: false, description: Vendor modelled label.}
      - {name: peril_id, dtype: int64, required: false, description: Canonical peril key.}
      - {name: lob_id, dtype: int64, required: false, description: Canonical LOB key.}
      - {name: peril_name, dtype: string, required: false, description: Peril display name.}
      - {name: region, dtype: string, required: false, description: Peril region.}
      - {name: peril_family, dtype: string, required: false, description: Peril family.}
      - {name: modelled_lob, dtype: string, required: false, description: Vendor modelled LOB.}
      - {name: rollup_lob, dtype: string, required: false, description: Rollup LOB.}
      - {name: lob_type, dtype: string, required: false, description: LOB type.}
      - {name: cds_cat_class_name, dtype: string, required: false, description: Hiscox class name.}
      - {name: office, dtype: string, required: false, description: Hiscox office.}
      - {name: class, dtype: string, required: false, description: Hiscox class code.}
      - {name: currency, dtype: string, required: false, description: Local currency.}
      - {name: forecast_factor, dtype: float64, required: true, description: Forecast scalar.}
      - {name: fx_rate, dtype: float64, required: true, description: FX scalar.}
      - {name: euws_rate_factor, dtype: float64, required: true, description: EUWS scalar.}
      - {name: adjusted_loss, dtype: float64, required: true, description: Adjusted GBP loss.}
      - {name: base_model, dtype: string, required: false, description: Blend base model.}
      - {name: blend_weight, dtype: float64, required: true, description: Vendor blend weight.}
      - {name: blended_loss, dtype: float64, required: true, description: Weighted adjusted loss.}
