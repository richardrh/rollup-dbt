version: 1
description: >-
  Pipeline2 dataset contracts. This data-side manifest is the source of truth for
  the clean, explicit, dbt-style Polars path.

datasets:
  lobs:
    role: source
    path: data/seeds/lobs.csv
    format: csv
    required: true
    description: Business line of business dimension with derived office/class metadata.
    columns:
      - {name: lob_id, dtype: int64, required: true, description: Canonical LOB key.}
      - {name: modelled_lob, dtype: string, required: true, description: Vendor/modelled LOB label.}
      - {name: rollup_lob, dtype: string, required: true, description: Rollup reporting LOB.}
      - {name: lob_type, dtype: string, required: true, description: Business LOB type.}
      - {name: cds_cat_class_name, dtype: string, required: true, description: Hiscox class name.}
      - {name: office, dtype: string, required: true, description: Hiscox office.}
      - {name: class, dtype: string, required: true, description: Hiscox class code.}
      - {name: currency, dtype: string, required: true, description: Local ISO-4217 currency.}

  perils:
    role: source
    path: data/seeds/perils.csv
    format: csv
    required: true
    description: Canonical peril dimension shared across vendors.
    columns:
      - {name: peril_id, dtype: int64, required: true, description: Canonical peril key.}
      - {name: name, dtype: string, required: true, description: Human-readable peril name.}
      - {name: region, dtype: string, required: true, description: Region code.}
      - {name: peril_family, dtype: string, required: true, description: Peril family such as EQ, FL, WS.}

  analyses:
    role: source
    path: data/seeds/analyses.csv
    format: csv
    required: true
    description: Vendor analysis identifiers mapped to canonical peril and optional LOB.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: modelled_label, dtype: string, required: true, description: Vendor display/modelled label.}
      - {name: peril_id, dtype: int64, required: true, description: Foreign key to perils.}
      - {name: lob_id, dtype: int64, required: false, description: RiskLink LOB key; nullable for Verisk.}

  selected_analyses:
    role: source
    path: data/seeds/selected_analyses.csv
    format: csv
    required: true
    status: first_class
    description: First-class pipeline2 allow-list of vendor analysis IDs selected for a run.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Selected vendor-native analysis identifier.}

  valid_analyses:
    role: source
    path: data/seeds/valid_analyses.csv
    format: csv
    required: false
    status: legacy_fallback
    description: Legacy fallback allow-list used only when selected_analyses is absent.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Legacy allowed vendor-native analysis identifier.}

  blending_weights:
    role: source
    path: data/seeds/blending_weights.csv
    format: csv
    required: true
    description: Long-format vendor blending weights by peril and return period.
    columns:
      - {name: peril_id, dtype: int64, required: true, description: Canonical peril key.}
      - {name: return_period, dtype: int64, required: true, description: EP return period.}
      - {name: peril_name, dtype: string, required: true, description: Display peril name.}
      - {name: description, dtype: string, required: true, description: Display description.}
      - {name: sub_peril, dtype: string, required: false, description: Optional sub-peril split.}
      - {name: vendor, dtype: string, required: true, description: Vendor receiving the weight.}
      - {name: base_model, dtype: string, required: true, description: Vendor base model selection.}
      - {name: weight, dtype: float64, required: true, description: Blend weight.}

  forecast_factors:
    role: source
    path: data/seeds/forecast_factors.csv
    format: csv
    required: true
    description: Long-format forecast factors by class, office, and date.
    columns:
      - {name: class, dtype: string, required: true, description: Hiscox class code.}
      - {name: office, dtype: string, required: true, description: Hiscox office.}
      - {name: office_iso2, dtype: string, required: true, description: Office country ISO-2 code.}
      - {name: forecast_date, dtype: date, required: true, description: Forecast date.}
      - {name: factor, dtype: float64, required: true, description: Forecast scalar.}

  fx_rates:
    role: source
    path: data/seeds/fx_rates.csv
    format: csv
    required: true
    description: Long-format FX rates from source currency to target currency.
    columns:
      - {name: currency_code, dtype: string, required: true, description: Source currency.}
      - {name: target_currency, dtype: string, required: true, description: Target currency.}
      - {name: rate_date, dtype: date, required: true, description: FX snapshot date.}
      - {name: rate, dtype: float64, required: true, description: FX conversion rate.}

  euws_rate_factors:
    role: source
    path: data/seeds/euws_rate_factors.csv
    format: csv
    required: true
    description: EU windstorm event factors by model event and occurrence year.
    columns:
      - {name: model_event_id, dtype: int64, required: true, description: Model event key.}
      - {name: occ_year, dtype: int64, required: true, description: Occurrence year.}
      - {name: factor, dtype: float64, required: true, description: EUWS scalar.}

  raw_verisk_ylt:
    role: source
    glob: data/ylt/verisk/*.parquet
    format: parquet
    required: true
    description: Raw AIR/Verisk YLT parquet exports with vendor wire column names.
    columns:
      - {name: Analysis, dtype: string, required: true, description: Verisk analysis label/id.}
      - {name: ExposureAttribute, dtype: string, required: true, description: Verisk LOB label.}
      - {name: CatalogTypeCode, dtype: string, required: true, description: Verisk catalog type.}
      - {name: EventID, dtype: int64, required: true, description: Event identifier.}
      - {name: ModelCode, dtype: int64, required: true, description: Model code.}
      - {name: YearID, dtype: int64, required: true, description: Simulation year.}
      - {name: PerilSetCode, dtype: int64, required: true, description: Verisk peril set code.}
      - {name: GroundUpLoss, dtype: float64, required: true, description: Ground-up loss.}
      - {name: GrossLoss, dtype: float64, required: true, description: Gross loss.}
      - {name: NetOfPreCatLoss, dtype: float64, required: true, description: Net pre-cat loss.}
      - {name: filename, dtype: string, required: true, description: Source file name.}

  raw_risklink_ylt:
    role: source
    glob: data/ylt/risklink/*.parquet
    format: parquet
    required: true
    description: Raw RMS/RiskLink YLT parquet exports with vendor wire column names.
    columns:
      - {name: yearid, dtype: int64, required: true, description: Simulation year.}
      - {name: eventid, dtype: int64, required: true, description: Event identifier.}
      - {name: p_value, dtype: float64, required: true, description: Probability value.}
      - {name: anlsid, dtype: int64, required: true, description: RiskLink analysis identifier.}
      - {name: meanloss, dtype: float64, required: true, description: Mean loss.}
      - {name: stddev, dtype: float64, required: true, description: Standard deviation.}
      - {name: expvalue, dtype: float64, required: true, description: Expected value.}
      - {name: loss, dtype: float64, required: true, description: Loss.}

  canonical_ep_summary:
    role: source
    glob: data/ep_summaries/**/*.long.csv
    format: csv
    required: false
    description: Optional canonical long EP summary input for review or blending derivation.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: lob, dtype: string, required: true, description: LOB label.}
      - {name: region_peril, dtype: string, required: true, description: Region/peril label.}
      - {name: ep_type, dtype: string, required: true, description: EP type such as AEP or OEP.}
      - {name: return_period, dtype: int64, required: true, description: Return period.}
      - {name: loss, dtype: float64, required: true, description: EP loss.}

  stg_selected_analyses:
    role: staging
    format: dataframe
    required: true
    description: Validated selected analyses after first-class/fallback resolution.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Selected analysis id.}

  stg_normalized_ylt:
    role: staging
    format: lazyframe
    required: true
    description: Minimal canonical YLT shape used by initial pipeline2 flow.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Ground-up or normalized loss.}

  int_selected_losses:
    role: intermediate
    format: lazyframe
    required: true
    description: Normalized YLT rows filtered to selected analyses.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: year_id, dtype: int64, required: true, description: Simulation year.}
      - {name: event_id, dtype: int64, required: true, description: Event identifier.}
      - {name: loss, dtype: float64, required: true, description: Selected loss.}

  mart_loss_summary:
    role: mart
    path: data/output/pipeline2_loss_summary.parquet
    format: parquet
    required: true
    description: Demonstrable pipeline2 mart; total loss by vendor and analysis.
    columns:
      - {name: vendor, dtype: string, required: true, description: Vendor name.}
      - {name: analysis_id, dtype: string, required: true, description: Vendor-native analysis identifier.}
      - {name: total_loss, dtype: float64, required: true, description: Sum of selected losses.}
      - {name: event_count, dtype: uint32, required: true, description: Number of selected YLT rows.}
