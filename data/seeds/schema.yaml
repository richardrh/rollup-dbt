version: 1
description: Pipeline seed dataset contracts colocated with seed inputs.

datasets:
  lobs:
    role: source
    path: data/seeds/business/lobs.csv
    format: csv
    required: true
    description: Business line of business dimension with derived office/class metadata.
    columns:
      - {
          name: lob_id,
          dtype: int64,
          required: true,
          description: Canonical LOB key.,
        }
      - {
          name: modelled_lob,
          dtype: string,
          required: true,
          description: Vendor/modelled LOB label.,
        }
      - {
          name: rollup_lob,
          dtype: string,
          required: true,
          description: Rollup reporting LOB.,
        }
      - {
          name: lob_type,
          dtype: string,
          required: true,
          description: Business LOB type.,
        }
      - {
          name: cds_cat_class_name,
          dtype: string,
          required: true,
          description: Hiscox class name.,
        }
      - {
          name: office,
          dtype: string,
          required: true,
          description: Hiscox office.,
        }
      - {
          name: class,
          dtype: string,
          required: true,
          description: Hiscox class code.,
        }
      - {
          name: currency,
          dtype: string,
          required: true,
          description: Local ISO-4217 currency.,
        }

  perils:
    role: source
    path: data/seeds/business/perils.csv
    format: csv
    required: true
    description: Peril lookup from modelled peril to rollup peril.
    columns:
      - {
          name: modelled_peril,
          dtype: string,
          required: true,
          description: Source modelled peril label from YLT inputs.,
        }
      - {
          name: rollup_peril,
          dtype: string,
          required: true,
          description: Clean rollup region peril name.,
        }
      - {
          name: region,
          dtype: string,
          required: true,
          description: Rollup region.,
        }
      - {
          name: peril,
          dtype: string,
          required: true,
          description: Rollup peril.,
        }
      - {
          name: region_peril_id,
          dtype: int64,
          required: true,
          description: Main blending factor RegionPerilID.,
        }
      - {
          name: selection_priority,
          dtype: int64,
          required: true,
          description: Priority for selecting one modelled peril per vendor, rollup LOB, and rollup peril. Lower values win; 99 means fallback.,
        }

  blending_weights:
    role: source
    path: data/seeds/vor/blending_weights.csv
    format: csv
    required: true
    description: Long-format vendor blending weights by peril and return period.
    columns:
      - {
          name: peril_id,
          dtype: int64,
          required: true,
          description: Canonical peril key.,
        }
      - {
          name: return_period,
          dtype: int64,
          required: true,
          description: EP return period.,
        }
      - {
          name: peril_name,
          dtype: string,
          required: true,
          description: Display peril name.,
        }
      - {
          name: description,
          dtype: string,
          required: true,
          description: Display description.,
        }
      - {
          name: sub_peril,
          dtype: string,
          required: false,
          description: Optional sub-peril split.,
        }
      - {
          name: vendor,
          dtype: string,
          required: true,
          description: Vendor receiving the weight.,
        }
      - {
          name: base_model,
          dtype: string,
          required: true,
          description: Vendor base model selection.,
        }
      - {
          name: weight,
          dtype: float64,
          required: true,
          description: Blend weight.,
        }

  blending_factors:
    role: source
    path: data/seeds/vor/blending_factors.csv
    format: csv
    required: true
    description: Vendor blend factors by region peril and sub-region peril.
    columns:
      - {
          name: id,
          dtype: int64,
          required: true,
          description: Row identifier.,
        }
      - {
          name: BlendSetID,
          dtype: int64,
          required: true,
          description: Blend set identifier.,
        }
      - {
          name: RegionPerilID,
          dtype: int64,
          required: true,
          description: Region peril identifier.,
        }
      - {
          name: RegionPeril,
          dtype: string,
          required: true,
          description: Region peril name.,
        }
      - {
          name: SubRegionPerilID,
          dtype: string,
          required: true,
          description: Sub-region peril identifier.,
        }
      - {
          name: SubRegionPeril,
          dtype: string,
          required: false,
          description: Sub-region peril name.,
        }
      - {
          name: AIRBlend,
          dtype: float64,
          required: true,
          description: AIR blend weight.,
        }
      - {
          name: RMSBlend,
          dtype: float64,
          required: true,
          description: RMS blend weight.,
        }
      - {
          name: KatRiskBlend,
          dtype: float64,
          required: true,
          description: KatRisk blend weight.,
        }
      - {
          name: DateCreated,
          dtype: datetime,
          required: true,
          description: Created timestamp.,
        }

  forecast_factors:
    role: source
    path: data/seeds/vor/forecast_factors.csv
    format: csv
    required: true
    description: Long-format forecast factors by class, office, and date.
    columns:
      - {
          name: class,
          dtype: string,
          required: true,
          description: Hiscox class code.,
        }
      - {
          name: office,
          dtype: string,
          required: true,
          description: Hiscox office.,
        }
      - {
          name: office_iso2,
          dtype: string,
          required: true,
          description: Office country ISO-2 code.,
        }
      - {
          name: forecast_date,
          dtype: date,
          required: true,
          description: Forecast date.,
        }
      - {
          name: factor,
          dtype: float64,
          required: true,
          description: Forecast scalar.,
        }

  fx_rates:
    role: source
    path: data/seeds/vor/fx_rates.csv
    format: csv
    required: true
    description: Long-format FX rates from source currency to target currency.
    columns:
      - {
          name: currency_code,
          dtype: string,
          required: true,
          description: Source currency.,
        }
      - {
          name: target_currency,
          dtype: string,
          required: true,
          description: Target currency.,
        }
      - {
          name: rate_date,
          dtype: date,
          required: true,
          description: FX snapshot date.,
        }
      - {
          name: rate,
          dtype: float64,
          required: true,
          description: FX conversion rate.,
        }

  euws_rate_factors:
    role: source
    path: data/seeds/vor/euws_rate_factors.csv
    format: csv
    required: true
    description: EU windstorm event factors by model event and occurrence year.
    columns:
      - {
          name: model_event_id,
          dtype: int64,
          required: true,
          description: Model event key.,
        }
      - {
          name: occ_year,
          dtype: int64,
          required: true,
          description: Occurrence year.,
        }
      - {
          name: factor,
          dtype: float64,
          required: true,
          description: EUWS scalar.,
        }

  euws_rank_overrides:
    role: source
    path: data/seeds/adjustments/euws_rank_overrides.csv
    format: csv
    required: true
    description: EUWS rank override factors by rollup LOB.
    columns:
      - {
          name: rollup_lob,
          dtype: string,
          required: true,
          description: Rollup LOB.,
        }
      - {
          name: max_rank,
          dtype: int64,
          required: true,
          description: Maximum EUWS event rank.,
        }
      - {
          name: factor,
          dtype: float64,
          required: true,
          description: Override scalar.,
        }

  stg_selected_analyses:
    role: staging
    format: dataframe
    required: true
    description: Validated selected analyses after source resolution.
    columns:
      - {
          name: vendor,
          dtype: string,
          required: true,
          description: Vendor name.,
        }
      - {
          name: analysis_id,
          dtype: string,
          required: true,
          description: Selected analysis id.,
        }
