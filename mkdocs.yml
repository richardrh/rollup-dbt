site_name: Polars Rollup Pipeline
site_description: Documentation for the polars rollup pipeline — RiskLink + Verisk YLTs to Hisco parquets.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - File formats: file-formats.md
  - Data requirements: data-requirements.md
  - Architecture: architecture.md
  - Factor chain: factor-chain.md
  - Calculations: calculations.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
