site_name: Laiter
site_description: Retail rollup analytics documentation
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: slate
  font:
    text: Space Grotesk
    code: Space Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      guess_lang: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

extra:
  homepage: /

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - Installation: installation.md
  - Core concepts: core-concepts.md
  - Data sources: data-sources.md
