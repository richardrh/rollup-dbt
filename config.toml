[fx]
target_currency = "GBP"

[outputs]
write_stage_outputs = true
write_duckdb = false
duckdb_file = "rollup.duckdb"
stage_output_dir = "stages"
staging_dir = "staging"
intermediate_dir = "intermediate"
marts_dir = "marts"
analysis_dir = "analysis"
combined_file = "mts_tbl_ylt_combined_all_factors.parquet"
wide_file = "mts_tbl_ylt_combined_all_factors_wide.parquet"
dialsup_file = "mts_tbl_ylt_dialsup.parquet"
ep_report_file = "ep_report.csv"

[outputs.fanout_prefixes]
verisk = "HiscoAIR"
risklink = "HiscoRMS"

[analysis]
return_periods = [30, 200, 1000]

[vendor_years]
verisk = 10000
risklink = 100000

[blending]
uplift_factor_min = 0.1
uplift_factor_max = 10.0

[[blending.target_points]]
ep_type = "AAL"
return_period = 0

[[blending.target_points]]
ep_type = "OEP"
return_period = 200

[[blending.target_points]]
ep_type = "OEP"
return_period = 1000

[blending.subregion_selection]
"216" = "216b"
