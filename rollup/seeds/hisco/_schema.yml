version: 2
seeds:
  # ============================================================
  # HISCO LOBS
  # ============================================================
  - name: hisco_lobs
    description: "Lookup table of HISCO Lines of Business."
    columns:
      - name: lob_id
        description: "Unique identifier for the LOB."
        tests:
          - not_null
          - unique
      - name: rollup_lob
        description: "Standardized LOB rollup grouping."
      - name: cds_cat_class_name
        description: "CDS catastrophe class name."
      - name: nds_class_name_gbp
        description: "NDS class name for GBP region."
      - name: nds_class_name_usd
        description: "NDS class name for USD region."
      - name: office
        description: "Office that owns the LOB."
  # ============================================================
  # HISCO REGION PERIL MAPS
  # ============================================================
  - name: hisco_region_peril
    description: "Mappings for region-peril IDs and vendor model usage."
    config:
      column_types:
        region_peril_id: integer
        base_model_vendor: varchar
        cds_region_peril: varchar
        cds_sub_region_peril: varchar
        cds_model_to_use: varchar
    columns:
      - name: region_peril_id
        description: "Numeric identifier for region-peril."
        tests:
          - unique
          - not_null
      - name: base_model_vendor
        description: "Vendor supplying the base model."
        tests:
          - accepted_values:
              values: ['verisk', 'risklink']
      - name: vendor_to_use
        description: "Which model vendor eventset to use"
        tests:
          - accepted_values:
              values: ['verisk', 'risklink']
      - name: cds_region_peril
        description: "CDS region peril code."
      - name: cds_sub_region_peril
        description: "CDS sub‑region peril code."
  # ============================================================
  # FORECAST FACTORS
  # ============================================================
  - name: forecast_factors
    description: "LOB-level forecast uplift/dampening factors by date."
    config:
      column_types:
        lob_id: integer
        base_date: date
        forecast_date: date
        factor: float
    columns:
      - name: lob_id
        description: "LOB identifier."
        tests:
          - not_null
          # Relationship to LOB table (best practice)
          - relationships:
              to: ref('hisco_lobs')
              field: lob_id
      - name: base_date
        description: "Base date used to compute the factor."
        tests:
          - not_null
      - name: forecast_date
        description: "Forecast period end date."
        tests:
          - not_null
      - name: factor
        description: "Forecast factor applied to projections."
        tests:
          - not_null
          - expression_is_true:
              expression: "factor > 0"
              expression: "factor <= 1.0"
  # ============================================================
  # FX RATES
  # ============================================================
  - name: fx_rates
    description: "Foreign exchange rates to USD."
    columns:
      - name: ccy
        description: "Currency ISO code."
        tests:
          - unique
          - not_null
      - name: rate_to_usd
        description: "Conversion rate to USD."
        tests:
          - not_null
          - expression_is_true:
              expression: "rate_to_usd > 0"
