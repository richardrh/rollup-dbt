version: 2
seeds:
  - name: adjustment_factors_l1__event
    description: "Max-grain adjustment factors keyed by lob, region peril, vendor, metric, year, event, and model event."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: metric
        tests:
          - not_null
      - name: yearid
        tests:
          - not_null
      - name: eventid
        tests:
          - not_null
      - name: model_eventid
        tests:
          - not_null
      - name: adjustment_factor
        description: "Multiplicative adjustment applied to the base loss metrics."
        tests:
          - not_null
          - expression_is_true:
              expression: "adjustment_factor > 0"
  - name: adjustment_factors_l2__metric
    description: "Metric-level adjustments by lob, region peril, and vendor."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: metric
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              expression: "adjustment_factor > 0"
  - name: adjustment_factors_l3__vendor
    description: "Vendor-specific adjustments for a lob and region peril."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: region_peril_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              expression: "adjustment_factor > 0"
  - name: adjustment_factors_l4__lob_vendor
    description: "LOB-vendor level adjustments."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: vendor
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              expression: "adjustment_factor > 0"
  - name: adjustment_factors_l5__lob
    description: "LOB-only fallbacks for when more granular overrides are absent."
    columns:
      - name: lob_id
        tests:
          - not_null
      - name: adjustment_factor
        tests:
          - not_null
          - expression_is_true:
              expression: "adjustment_factor > 0"
