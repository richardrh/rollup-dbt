[project]
name = "retail-rollup-dbt"
version = "0.1.0"
description = "Clean pipeline Polars DAG with dbt-style model folders."
requires-python = "==3.13.*"
dependencies = [
    "argcomplete>=3.0",
    "duckdb>=1.4.4",
    "tomli-w>=1.2.0",
    "polars>=1.20.0",
    "pandera[polars]>=0.27.0",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0",
    "pyodbc",
]

[dependency-groups]
dev = [
    "zensical==0.0.33",     # 0.0.34 introduced a scheduler regression that produces empty site/ — see zensical#594
    "openpyxl>=3.1",
    "pytest>=9.0.2",
    "pytest-xdist>=3.8.0",
]

[tool.uv]
default-groups = ["dev"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["polars/rollup"]

[tool.pytest.ini_options]
testpaths = ["polars/tests"]
pythonpath = ["polars"]
markers = [
    "integration: end-to-end test that requires external resources (Docker, network). Skipped by default; opt-in with `--run-integration` or `-m integration`.",
    "fuzz: property-based test using Hypothesis. Skipped by default; opt-in with `--run-fuzz` or `-m fuzz`.",
]
