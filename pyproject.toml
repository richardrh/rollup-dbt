[project]
name = "retail-rollup-dbt"
version = "0.1.0"
description = "YAML-backed pipeline2 Polars flow."
requires-python = "==3.13.*"
dependencies = [
    "polars>=1.20.0",
    "pyyaml>=6.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[tool.uv]
default-groups = ["dev"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["polars/rollup"]

[tool.pytest.ini_options]
testpaths = ["polars/tests"]
pythonpath = ["polars"]
