[project]
name = "retail-rollup-dbt"
version = "0.1.0"
description = "Add your description here"
requires-python = "==3.13.*"
dependencies = [
    "dbt-core>=1.11.2",
    "dbt-duckdb>=1.10.0",
    "duckdb>=1.4.4",
    "tomli-w>=1.2.0",
    "rich>=14.3.2",
    "certifi>=2026.1.4",
    "python-certifi-win32>=1.6.1",
    "polars>=1.20.0",
    "sqlalchemy>=2.0",
    "pyodbc",
    "ibis>=3.3.0",
    "datafusion>=53.0.0",
]

[dependency-groups]
dev = [
    "zensical",
    "pandoc>=2.4",
    "pymdown-extensions>=10.16",
    "pytest>=9.0.2",
    "numpy>=2.0",
]

[tool.uv]
default-groups = ["dev"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["polars/rollup"]

[tool.pytest.ini_options]
testpaths = ["polars/tests"]
pythonpath = ["polars"]
